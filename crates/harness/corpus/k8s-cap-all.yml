# Adds ALL capabilities — equivalent to privileged.
# EXPECT: Critical K8S-CAP-ADD-ALL
apiVersion: v1
kind: Pod
metadata:
  name: app
spec:
  containers:
    - name: app
      image: nginx@sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      securityContext:
        runAsNonRoot: true
        capabilities:
          add: ["ALL"]
