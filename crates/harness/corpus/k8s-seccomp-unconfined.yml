# seccompProfile Unconfined removes the syscall filter.
# EXPECT: High K8S-SECCOMP-UNCONFINED
apiVersion: v1
kind: Pod
metadata:
  name: app
spec:
  containers:
    - name: app
      image: nginx@sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: Unconfined
