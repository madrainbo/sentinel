name: release

# On a version tag (e.g. v0.1.0), create the GitHub Release, then cross-compile
# the `sentinel` binary for each target and attach archives + SHA-256 checksums.
# The CI Action and local installers download these prebuilt binaries.
#
# Note: taiki-e/upload-rust-binary-action only UPLOADS to an existing release —
# it does not create one. The create-release job below must run first (the
# upload matrix `needs:` it), otherwise every upload fails with "release not
# found".

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release for the tag
        uses: taiki-e/create-gh-release-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Build & upload binary
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: sentinel
          target: ${{ matrix.target }}
          archive: sentinel-$tag-$target
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}
