name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --workspace --verbose
      - name: Unit tests
        run: cargo test --workspace --verbose
      - name: Eval harness (gate)
        run: cargo run -p harness

      - name: RULES.md is in sync with the rule catalog
        run: |
          cargo run -q -p cli -- rules > RULES.md.gen
          if ! diff -u RULES.md RULES.md.gen; then
            echo "::error::RULES.md is stale. Regenerate with: cargo run -p cli -- rules > RULES.md"
            exit 1
          fi
          rm RULES.md.gen
